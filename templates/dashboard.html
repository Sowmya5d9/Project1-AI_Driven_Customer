<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">

            <h3 class="text-center mt-3">Analytics</h3>

            <ul class="nav flex-column mt-4">

                <li class="nav-item">
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a href="/customers" class="nav-link">Customers</a>
                </li>

                <li class="nav-item">
                    <a href="/segmentation" class="nav-link">Segmentation</a>
                </li>

                <li class="nav-item">
                    <a href="/prediction" class="nav-link">Prediction</a>
                </li>

                <li class="nav-item">
                    <a href="/recommendation" class="nav-link">Recommendations</a>
                </li>

                <li class="nav-item">
                    <a href="/logout" class="nav-link text-danger">Logout</a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">

            <h2 class="mb-4">
                AI-Driven Customer Analytics Dashboard
            </h2>

            <!-- KPI Cards -->
            <div class="row">

                <div class="col-md-3">
                    <div class="card shadow-sm text-center">
                        <div class="card-body">
                            <h5>Total Customers</h5>
                            <h2>500</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow-sm text-center">
                        <div class="card-body">
                            <h5>Active Customers</h5>
                            <h2>420</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow-sm text-center">
                        <div class="card-body">
                            <h5>Predicted Buyers</h5>
                            <h2>310</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow-sm text-center">
                        <div class="card-body">
                            <h5>Churn Risk</h5>
                            <h2>15%</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Charts Row -->
            <div class="row mt-4">

                <div class="col-md-6">

                    <div class="card shadow-sm">
                        <div class="card-body">

                            <h5 class="text-center">
                                Customer Segmentation
                            </h5>

                            <canvas id="segmentChart"></canvas>

                        </div>
                    </div>

                </div>

                <div class="col-md-6">

                    <div class="card shadow-sm">
                        <div class="card-body">

                            <h5 class="text-center">
                                Churn Analysis
                            </h5>

                            <canvas id="churnChart"></canvas>

                        </div>
                    </div>

                </div>

            </div>

            <!-- Revenue Trend -->
            <div class="row mt-4">

                <div class="col-md-12">

                    <div class="card shadow-sm">

                        <div class="card-body">

                            <h5 class="text-center">
                                Monthly Revenue Trend
                            </h5>

                            <canvas id="revenueChart"></canvas>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Custom Chart File -->
<script src="{{ url_for('static', filename='chart.js') }}"></script>

</body>
</html>
